<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente | Frankie Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #5a9254; /* El verde del logo */
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-float {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .whatsapp-button {
            background-color: #25D366;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(37, 211, 102, 0.5);
        }

        .whatsapp-button:hover {
            background-color: #128C7E;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(37, 211, 102, 0.6);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(90, 146, 84, 0.3));
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden relative text-white selection:bg-[#5a9254] selection:text-black">
    
    <!-- Fondo decorativo -->
    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-black opacity-20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-black opacity-30 rounded-full blur-3xl"></div>

    <div class="glass-card max-w-xl w-full rounded-[2.5rem] p-10 md:p-14 shadow-2xl text-center relative z-10">
        
        <!-- Logo de Frankie Academy -->
        <div class="flex justify-center mb-10">
            <div class="animate-float">
                <img src="logo.png" 
                     alt="Logo Frankie Academy" 
                     class="w-40 md:w-56 h-auto logo-glow" 
                     onerror="this.src='https://via.placeholder.com/300x300?text=Frankie+Academy'">
            </div>
        </div>

        <h1 class="text-4xl md:text-5xl font-black mb-6 tracking-tight uppercase leading-none">
            Estamos <span class="text-[#5a9254]">Cocinando</span><br>algo brutal
        </h1>
        
        <p class="text-gray-400 text-base md:text-lg mb-10 font-light leading-relaxed max-w-md mx-auto">
            En <span class="text-white font-semibold">Frankie Academy</span> estamos afinando los últimos detalles. Muy pronto lanzaremos nuestra nueva plataforma.
        </p>

        <!-- Botón de WhatsApp -->
        <div class="flex justify-center mb-14">
            <a href="https://wa.me/584222136140?text=Hola!%20Vengo%20de%20la%20web%20y%20quisiera%20más%20información%20sobre%20Frankie%20Academy" 
               target="_blank" 
               class="whatsapp-button flex items-center gap-3 px-10 py-5 rounded-2xl text-black font-extrabold text-sm md:text-base uppercase tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L22 2Z"/><path d="m17 11-4-4-4 4"/><path d="M13 7v10"/></svg>
                Escríbenos al WhatsApp
            </a>
        </div>

        <!-- Redes Sociales -->
        <div class="space-y-6">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] font-bold">Mantente al tanto</p>
            <div class="flex justify-center gap-10">
                <a href="https://www.instagram.com/frankie.academy/" target="_blank" class="text-gray-400 hover:text-[#5a9254] transition-all flex items-center gap-2 group">
                    <span class="text-sm font-bold">Instagram</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-y-[-2px] transition-transform"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                </a>
                <a href="https://www.tiktok.com/@frankie.academy" target="_blank" class="text-gray-400 hover:text-[#5a9254] transition-all flex items-center gap-2 group">
                    <span class="text-sm font-bold">TikTok</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-y-[-2px] transition-transform"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
                </a>
            </div>
        </div>

        <!-- Copyright -->
        <div class="mt-14 pt-8 border-t border-white/5">
            <p class="text-[10px] text-gray-600 uppercase tracking-[0.25em]">© 2026 Frankie Academy · Potenciando tu futuro</p>
        </div>
    </div>
</body>
</html>
